<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3eaf7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc08d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外圆 -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- IoT 图标 -->
  <g transform="translate(50,50)">
    <!-- 中心节点 -->
    <circle cx="0" cy="0" r="6" fill="white"/>
    
    <!-- 连接线和外围节点 -->
    <g stroke="white" stroke-width="2" fill="white">
      <!-- 上方节点 -->
      <line x1="0" y1="0" x2="0" y2="-20"/>
      <circle cx="0" cy="-20" r="3"/>
      
      <!-- 右上节点 -->
      <line x1="0" y1="0" x2="14" y2="-14"/>
      <circle cx="14" cy="-14" r="3"/>
      
      <!-- 右方节点 -->
      <line x1="0" y1="0" x2="20" y2="0"/>
      <circle cx="20" cy="0" r="3"/>
      
      <!-- 右下节点 -->
      <line x1="0" y1="0" x2="14" y2="14"/>
      <circle cx="14" cy="14" r="3"/>
      
      <!-- 下方节点 -->
      <line x1="0" y1="0" x2="0" y2="20"/>
      <circle cx="0" cy="20" r="3"/>
      
      <!-- 左下节点 -->
      <line x1="0" y1="0" x2="-14" y2="14"/>
      <circle cx="-14" cy="14" r="3"/>
      
      <!-- 左方节点 -->
      <line x1="0" y1="0" x2="-20" y2="0"/>
      <circle cx="-20" cy="0" r="3"/>
      
      <!-- 左上节点 -->
      <line x1="0" y1="0" x2="-14" y2="-14"/>
      <circle cx="-14" cy="-14" r="3"/>
    </g>
  </g>
  
  <!-- 文字 IoT -->
  <text x="50" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">IoT</text>
</svg>